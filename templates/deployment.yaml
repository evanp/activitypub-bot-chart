apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "activitypub-bot.fullname" . }}
  labels:
    {{- include "activitypub-bot.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "activitypub-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.podAnnotations .Values.domainBlockList.enabled }}
      annotations:
        {{- if .Values.domainBlockList.enabled }}
        checksum/domain-blocklist: {{ .Files.Get .Values.domainBlockList.file | sha256sum | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "activitypub-bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "activitypub-bot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          volumeMounts:
          - name: data
            mountPath: /data
          - name: bots
            mountPath: {{ .Values.scriptConfig.mountPath }}/{{ .Values.scriptConfig.fileName }}
            subPath: {{ .Values.scriptConfig.fileName }}
          {{- if .Values.domainBlockList.enabled }}
          - name: domain-blocklist
            mountPath: {{ .Values.domainBlockList.mountDir }}
            readOnly: true
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          env:
            - name: DATABASE_URL
              value: "sqlite:/data/activitypubbot.db"
            - name: ORIGIN
              value: {{ .Values.activitypubbot.origin }}
            - name: PORT
              value: "{{ .Values.service.port }}"
            - name: BOTS_CONFIG_FILE
              value: "{{ .Values.scriptConfig.mountPath }}/{{ .Values.scriptConfig.fileName }}"
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: {{ .Values.activitypubbot.logLevel }}
            - name: TRUST_PROXY
              value: "{{ .Values.activitypubbot.trustProxy }}"
            {{- if .Values.activitypubbot.redis.existingSecret }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.activitypubbot.redis.existingSecret }}
                  key: {{ .Values.activitypubbot.redis.secretKey | default "url" }}
            {{- else if .Values.activitypubbot.redis.url }}
            - name: REDIS_URL
              value: {{ .Values.activitypubbot.redis.url | quote }}
            {{- end }}
            {{- if .Values.domainBlockList.enabled }}
            - name: DOMAIN_BLOCK_LIST
              value: {{ printf "%s/%s" .Values.domainBlockList.mountDir (base .Values.domainBlockList.file) | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "activitypub-bot.fullname" . }}-data-pvc
        - name: bots
          configMap:
            name: {{ include "activitypub-bot.fullname" . }}-bots
        {{- if .Values.domainBlockList.enabled }}
        - name: domain-blocklist
          configMap:
            name: {{ include "activitypub-bot.fullname" . }}-domain-blocklist
        {{- end }}
